name: Universal SAF Injection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  inject-and-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool aapt

      - name: Decompile Target APK
        run: |
          # 自动寻找仓库里的第一个 APK
          APK_FILE=$(ls *.apk | head -n 1)
          echo "ORIGINAL_APK=$APK_FILE" >> $GITHUB_ENV
          apktool d "$APK_FILE" -o apk_src

      - name: Extract Package Name & Patch Source
        run: |
          PKG_NAME=$(aapt dump badging "${{ env.ORIGINAL_APK }}" | grep package | awk -F"'" '{print $2}')
          echo "TARGET_PKG=$PKG_NAME" >> $GITHUB_ENV
          
          PKG_PATH=$(echo $PKG_NAME | tr '.' '/')
          echo "TARGET_PKG_PATH=$PKG_PATH" >> $GITHUB_ENV
          
          # 替换源码中的包名占位符 (请确保 SAFProvider.java 中使用的是 PACKAGE_NAME_PLACEHOLDER)
          sed -i "s/PACKAGE_NAME_PLACEHOLDER/$PKG_NAME/g" SAFProvider.java

      - name: Compile SAFProvider to Smali (Safe Path)
        run: |
          # 1. 自动寻找 android.jar
          PLATFORM_DIR=$(ls -d $ANDROID_HOME/platforms/android-* | sort -V | tail -n 1)
          CP="$PLATFORM_DIR/android.jar"
          echo "Using Android SDK: $CP"
          
          javac -encoding UTF-8 -classpath "$CP" SAFProvider.java
          
          # 2. 编译 Class 为 Dex
          $ANDROID_HOME/build-tools/34.0.0/d8 --lib "$CP" --output . SAFProvider.class
          
          # 3. 核心：动态寻找 apktool 的真实 JAR 路径
          # 我们扫描常见的安装路径，直到找到包含 baksmali 类的那个
          REAL_JAR=$(find /usr/share/java /usr/share/apktool -name "*.jar" | xargs grep -l "baksmali" | head -n 1)
          echo "Found real JAR: $REAL_JAR"
          
          # 4. 执行反编译
          java -cp "$REAL_JAR" org.jf.baksmali.Main d classes.dex -o smali_out/

      - name: Inject Code and Manifest
        run: |
          # 创建目录并拷贝生成的 smali
          mkdir -p apk_src/smali/${{ env.TARGET_PKG_PATH }}/
          
          # 这里的 find 确保即使 baksmali 生成了 package 文件夹也能被找到
          find smali_out -name "SAFProvider*.smali" -exec cp {} apk_src/smali/${{ env.TARGET_PKG_PATH }}/ \;

          # 注入 Manifest
          if ! grep -q "SAFProvider" apk_src/AndroidManifest.xml; then
            sed -i '/<\/application>/i \
            <provider android:name="${{ env.TARGET_PKG }}.SAFProvider" \
                android:authorities="${{ env.TARGET_PKG }}.documents" \
                android:exported="true" \
                android:grantUriPermissions="true" \
                android:permission="android.permission.MANAGE_DOCUMENTS"> \
                <intent-filter> \
                    <action android:name="android.content.action.DOCUMENTS_PROVIDER" /> \
                </intent-filter> \
            </provider>' apk_src/AndroidManifest.xml
          fi
          
      - name: Build and Sign
        run: |
          # 1. 回编译 APK
          apktool b apk_src -o unsigned.apk
          
          # 2. 直接使用根目录下的密钥文件进行签名
          # 注意：密码等敏感信息依然建议放在 GitHub Secrets 中
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks key.jks \
            --ks-key-alias "${{ secrets.JKS_ALIAS }}" \
            --ks-pass pass:"${{ secrets.JKS_PASSWORD }}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --out final_signed.apk unsigned.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Injected-APK
          path: final_signed.apk
