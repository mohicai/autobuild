name: Universal SAF Injection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  inject-and-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool aapt
          # 使用 Google 维护的 GitHub Release 地址，替代已失效的 Bitbucket 链接
          wget https://github.com/google/smali/releases/download/v2.5.2/baksmali-2.5.2.jar -O baksmali.jar

      - name: Decompile Target APK
        run: |
          # 反编译 APK 到 apk_src 目录
          apktool d target.apk -o apk_src

      - name: Extract Package Name & Patch Source
        run: |
          # 1. 自动从 Manifest 中提取真实包名
          PKG_NAME=$(aapt dump badging target.apk | grep package | awk -F"'" '{print $2}')
          echo "Detected Package: $PKG_NAME"
          echo "TARGET_PKG=$PKG_NAME" >> $GITHUB_ENV
          
          # 2. 将点号包名转为路径 (例如 com.test.app -> com/test/app)
          PKG_PATH=$(echo $PKG_NAME | tr '.' '/')
          echo "TARGET_PKG_PATH=$PKG_PATH" >> $GITHUB_ENV
          
          # 3. 替换 Java 源码中的占位符
          sed -i "s/PACKAGE_NAME_PLACEHOLDER/$PKG_NAME/g" SAFProvider.java

      - name: Compile SAFProvider to Smali
        run: |
          # 1. 编译 Java (依赖 android.jar)
          javac -encoding UTF-8 -classpath android.jar SAFProvider.java
          
          # 2. 编译 Class 为 Dex
          $ANDROID_HOME/build-tools/34.0.0/d8 --lib android.jar --output . SAFProvider.class
          
          # 3. 反编译 Dex 为 Smali
          java -jar baksmali.jar d classes.dex -o smali_out/

      - name: Inject Code and Manifest
        run: |
          # 1. 创建目标包名目录并移动 Smali 文件
          # 使用通配符 SAFProvider*.smali 以包含可能产生的匿名类文件
          mkdir -p apk_src/smali/${{ env.TARGET_PKG_PATH }}/
          cp smali_out/${{ env.TARGET_PKG_PATH }}/SAFProvider*.smali apk_src/smali/${{ env.TARGET_PKG_PATH }}/
          
          # 2. 注入 Provider 声明到 AndroidManifest.xml
          # 在 </application> 闭合标签前插入配置
          sed -i '/<\/application>/i \
          <provider android:name="${{ env.TARGET_PKG }}.SAFProvider" \
              android:authorities="${{ env.TARGET_PKG }}.documents" \
              android:exported="true" \
              android:grantUriPermissions="true" \
              android:permission="android.permission.MANAGE_DOCUMENTS"> \
              <intent-filter> \
                  <action android:name="android.content.action.DOCUMENTS_PROVIDER" /> \
              </intent-filter> \
          </provider>' apk_src/AndroidManifest.xml

      - name: Build Unsigned APK
        run: |
          # 回编译 APK
          apktool b apk_src -o unsigned.apk

      - name: Sign APK with JKS
        run: |
          # 从 Secrets 还原 JKS 文件
          echo "${{ secrets.JKS_BASE64 }}" | base64 -d > key.jks
          
          # 签名并对齐
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks key.jks \
            --ks-key-alias "${{ secrets.JKS_ALIAS }}" \
            --ks-pass pass:"${{ secrets.JKS_PASSWORD }}" \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out final_signed.apk unsigned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Injected-SAF-APK
          path: final_signed.apk
